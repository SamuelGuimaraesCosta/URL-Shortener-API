openapi: 3.0.3
info:
  title: URL Shortener API
  description: Production-style URL Shortener built with Go
  version: 1.0.0

servers:
  - url: http://localhost:8080

paths:
  /shorten:
    post:
      summary: Create a short URL
      operationId: createShortUrl
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateURLRequest'
      responses:
        '200':
          description: Short URL created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateURLResponse'
        '400':
          description: Invalid request

  /{code}:
    get:
      summary: Redirect to original URL
      operationId: redirectUrl
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Redirect to original URL
        '404':
          description: URL not found

components:
  schemas:

    CreateURLRequest:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          example: https://google.com

    CreateURLResponse:
      type: object
      properties:
        code:
          type: string
          example: Ab3KpQ
        short:
          type: string
          example: http://localhost:8080/Ab3KpQ
